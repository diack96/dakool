name: CI - Build, Test & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  NPM_VERSION: '>=10.x'

jobs:
  # Job 1: Vérifications de qualité de code
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 ESLint - Check code style
        run: npm run lint
        continue-on-error: false

      - name: 📝 TypeScript - Type checking
        run: npx tsc --noEmit
        continue-on-error: false

      - name: 📊 Code size analysis
        run: |
          echo "📊 Analyzing bundle size..."
          du -sh .next 2>/dev/null || echo "No build directory found"
          find src -type f -name "*.ts" -o -name "*.tsx" | wc -l | xargs echo "TypeScript files:"

  # Job 2: Tests unitaires
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test -- --coverage --watchAll=false
        continue-on-error: true

      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Job 3: Build et vérification
  build:
    name: Build Application
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NODE_ENV: production

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Ensure npm version
        run: |
          LOCKFILE_VERSION=$(node -p "require('./package-lock.json').lockfileVersion" 2>/dev/null || echo "unknown")
          echo "Detected lockfileVersion: $LOCKFILE_VERSION"
          if [ "$LOCKFILE_VERSION" = "3" ]; then
            echo "Installing npm@11..."
            npm install -g npm@11
          fi
          npm --version

      - name: 🔍 Verify required secrets
        run: |
          missing=0
          [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] && echo "❌ NEXT_PUBLIC_SUPABASE_URL missing" && missing=1
          [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && echo "❌ NEXT_PUBLIC_SUPABASE_ANON_KEY missing" && missing=1
          if [ $missing -eq 1 ]; then
            echo "❌ Required secrets missing"
            exit 1
          fi
          echo "✅ Secrets OK"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔎 Check TypeScript types
        run: |
          npm ls @types/react || npm install --save-dev @types/react @types/react-dom

      - name: 🏗️ Build Next.js application
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: false

      - name: ✅ Verify build output
        run: |
          if [ -d ".next" ]; then
            echo "✅ Build successful"
            du -sh .next
            echo "📊 Build artifacts:"
            find .next -type f -name "*.js" -o -name "*.json" | head -20
          else
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi

      - name: 📦 Cache build artifacts
        uses: actions/cache@v4
        if: success()
        with:
          path: .next
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

  # Job 4: Vérification de sécurité
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: 🛡️ Check for known vulnerabilities
        run: |
          echo "🔍 Checking for security issues..."
          npm audit --json > audit-report.json || true
          cat audit-report.json | jq '.metadata.vulnerabilities' || echo "No vulnerabilities found"

  # Job 5: Notification et résumé
  notify:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality, test, build, security]
    if: always()

    steps:
      - name: 📊 CI Status Summary
        run: |
          echo "## 🚀 CI Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Checks | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ **Build failed** - Please check the logs" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "✅ **All checks passed!**" >> $GITHUB_STEP_SUMMARY

