name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Job 1: Pré-déploiement - Vérifications
  pre-deploy:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NODE_ENV: production

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Verify environment variables
        run: |
          echo "🔍 Verifying environment variables..."
          [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] && echo "❌ NEXT_PUBLIC_SUPABASE_URL missing" && exit 1
          [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && echo "❌ NEXT_PUBLIC_SUPABASE_ANON_KEY missing" && exit 1
          echo "✅ All required environment variables are set"

      - name: 🏗️ Build application
        run: npm run build

      - name: ✅ Verify build
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ Build successful"
          du -sh .next

  # Job 2: Déploiement Vercel
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: pre-deploy
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: 📊 Deployment Summary
        run: |
          echo "## 🚀 Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Deployment successful!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 Production URL: https://waraba-academy.vercel.app" >> $GITHUB_STEP_SUMMARY

  # Job 3: Post-déploiement - Vérifications
  post-deploy:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: deploy-vercel
    timeout-minutes: 10

    steps:
      - name: 🔍 Health Check
        run: |
          echo "🔍 Checking production health..."
          sleep 30  # Wait for deployment to stabilize
          
          # Check main endpoints
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://waraba-academy.vercel.app || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Main page returned status: $STATUS"
          else
            echo "✅ Main page is healthy"
          fi
          
          # Check API endpoints
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://waraba-academy.vercel.app/api/courses || echo "000")
          if [ "$API_STATUS" != "200" ]; then
            echo "⚠️ API endpoint returned status: $API_STATUS"
          else
            echo "✅ API endpoint is healthy"
          fi

      - name: 📊 Deployment Report
        run: |
          echo "## 📊 Post-Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Deployment completed successfully**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Production URL:** https://waraba-academy.vercel.app" >> $GITHUB_STEP_SUMMARY
